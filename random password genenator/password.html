<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author"  content="mahammed">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            display: flex;
            justify-content: center;
            height: 100vh;
            align-items: center;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }
        .password-container{
            background-color:#c050a06c;
            width: 500px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,.3);
            margin: 10px;
        }
        .input-container{
            border: solid  2px #000000;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .input{
            border: none;
            background-color: transparent;
            outline:none;
            font-size: 24px;
            letter-spacing: 4px;
        }
        .input::placeholder{
            letter-spacing: 0px;
        }
        .Copy-Content-Vector-Icon-Document-Icon{
            background-color: #050505;
            color: rgb(253, 252, 252);
            width: 20px;
            height: 20px;
            border-radius: 7px;
            cursor: pointer;
            opacity: .3;
        }
        .Copy-Content-Vector-Icon-Document-Icon:hover{
            background-color: whitesmoke;
            color: #000000;
            opacity: 0.7;
        }
        .btn{
            background-color: #000000;
            color: whitesmoke;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            margin: 10px 0;
            font-size: 20px;
            cursor: pointer;
        }
        .btn:hover{
            background-color: #09e61c;
        }
        .btn:active{
            transform: scale(0.95);
        }
        .alert-contairner{
            position: fixed;
            width: 300px;
            height: 50px;
            background-color: #01fd16;
            bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 4px rgba(0,0,0,.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: 0.4;
        }
        .active.alert-contairner{
            right: -300px;
        }
    </style>
    <title>Random Password Generator</title>
</head>
<body>
    <div class="password-container">
        <h2>Random Password Generator</h2>
        <div class="input-container">
            <input type="text" id="input" class="input" placeholder="create Passworqd" readonly>
            <i class="Copy-Content-Vector-Icon-Document-Icon" title="Copy Password ">🖨</i>
        </div>
        <button class="btn">Generator</button>
    </div>
    <div class="alert-contairner active">password copied</div>
    <script>
        const btnEl = document.querySelector(".btn");
        const inputEl = document.getElementById("input")
        const copyiconEl = document.querySelector(".Copy-Content-Vector-Icon-Document-Icon")
        const alertcontairnerEl = document.querySelector(".alert-contairner")
        btnEl.addEventListener("click", () =>{
            createPassword();
            // if(inputEl.value){
            //     alertcontairnerEl.classList.remove("active");
            //     setTimeout(()=>{
            //         alertcontairnerEl.classList.add("active");
            //     },2000);   
            // }
        });
        copyiconEl.addEventListener("click",() =>{
            alertcontairnerEl.classList.remove("active");
            setTimeout(()=>{
                alertcontairnerEl.classList.add("active");
            },4000);
            copypassword();
        })
        function createPassword(){
            const chars = "qwertyuiopasdfghjklzxcvbnmQWERTYUIOPASDFGHJKLZXCVBNM1234567890!@#$%^&*()_";
            const passwordlength = 14;
            let password = "";
            for (let index = 0; index < passwordlength; index++) {
                const randomNum =  Math.floor(Math.random() * chars.length);
                password += chars.substring(randomNum, randomNum + 1);
                (randomNum, password + 1);
                
            }
            inputEl.value = password;
            inputEl.setSelectionRange(0,9999)
            navigator.clipboard.writeText(inputEl.value);
            alertcontairnerEl.innerText = password + " copied!"
        }
        function copypassword(){
            inputEl.select();
            inputEl.setSelectionRange(0,9999)
            navigator.clipboard.writeText(inputEl.value);
            alertcontairnerEl.innerText = password + " copied!"
        }
    </script>
</body>
</html>
